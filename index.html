<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando para lingua do sistema...</title>
    <script>
        const savedLang = localStorage.getItem('preferredLanguage');

        if (savedLang) {
            window.location.replace(`./html/${savedLang}.html`);
        } else {
            const browserLang = navigator.language?.toLowerCase() || 'en';
            const lang = browserLang.startsWith('pt') ? 'pt-br' : 'en-us';
            window.location.replace(`./html/${lang}.html`);
        }
    </script>
</head>

<body>

</body>

</html>
